spring.application.name=apibarbershop

spring.jackson.time-zone=America/Lima

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/dbbarbershop2026}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:alexander}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

spring.jpa.generate-ddl=false
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=100MB

jwt.secret=BarberShopSecretKey2026SuperSeguraParaJWT
jwt.expiration=86400000

# Ruta donde se guardan las imágenes de referencia del cliente
# Relativa a la raíz del proyecto. Cambiar a ruta absoluta en producción.
upload.path=uploads/appointments/

# Ruta donde se guardan las fotos de los usuarios/barberos
upload.users.path=uploads/users/
