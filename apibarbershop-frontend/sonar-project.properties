# ─── SonarQube Scanner Configuration ───────────────────────────────────────
# URL de tu servidor SonarQube local
sonar.host.url=http://localhost:9000

# Token de autenticación — se pasa por línea de comandos con: -D sonar.token=TU_TOKEN
# NO dejar el token aquí en texto plano para evitar alertas de seguridad

# Clave del proyecto (debe coincidir con el Project Key en SonarQube)
sonar.projectKey=barbershop-frontend
sonar.projectName=barbershop-frontend

# Versión del proyecto (opcional, puedes incrementar con cada análisis)
sonar.projectVersion=1.0

# ─── Código fuente ──────────────────────────────────────────────────────────
sonar.sources=src

# Excluir archivos generados, dependencias y tests
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.spec.ts,**/environments/**

# ─── TypeScript / Angular ────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.json
